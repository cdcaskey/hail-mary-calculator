<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xenolingual Numeral Decoder</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glow:     #00ff9f;
      --glow-mid: rgba(0,255,159,0.35);
      --glow-dim: rgba(0,255,159,0.12);
      --gold:     #ffd84d;
      --gold-dim: rgba(255,216,77,0.3);
      --bg:       #060810;
      --panel:    #0b0f18;
      --border:   #142030;
      --muted:    #253545;
      --text:     #c8dde8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 0;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.5em;
      color: var(--glow);
      text-shadow: 0 0 24px var(--glow), 0 0 6px var(--glow);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Panel ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.75rem;
      width: 100%;
      max-width: 460px;
      box-shadow:
        0 0 60px rgba(0,255,159,0.04),
        inset 0 0 30px rgba(0,0,0,0.6);
    }

    /* ── Display ── */
    .display {
      background: #050810;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1rem 1.25rem 1.1rem;
      margin-bottom: 1.4rem;
      position: relative;
      overflow: hidden;
    }

    .display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,255,159,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .display-label {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .alien-number {
      font-size: 2.8rem;
      line-height: 1;
      color: var(--glow);
      text-shadow: 0 0 18px var(--glow-mid);
      min-height: 3rem;
      word-break: break-all;
      letter-spacing: 0.1em;
    }

    .alien-number:empty::after {
      content: '';
    }

    /* cursor */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 2.4rem;
      background: var(--glow);
      vertical-align: middle;
      border-radius: 1px;
      animation: blink 1.1s step-end infinite;
      box-shadow: 0 0 8px var(--glow);
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* divider */
    .display-divider {
      height: 1px;
      background: var(--border);
      margin: 0.9rem 0;
    }

    /* result row */
    .result-row {
      display: flex;
      align-items: baseline;
      gap: 0.7rem;
    }

    .result-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .result-value {
      font-size: 1.8rem;
      color: var(--gold);
      text-shadow: 0 0 16px var(--gold-dim);
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }

    .result-value.empty {
      color: var(--muted);
      font-size: 1.4rem;
      text-shadow: none;
    }

    /* ── V-with-stroke symbol ── */
    .vs {
      position: relative;
      display: inline-block;
    }

    .vs::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-1px);
      height: 2px;
      background: currentColor;
      box-shadow: 0 0 4px currentColor;
      border-radius: 1px;
    }

    /* ── Symbol Keys ── */
    .key-section-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.45rem;
      margin-bottom: 0.6rem;
    }

    .key {
      background: #0c1520;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--glow);
      font-family: inherit;
      font-size: 1.7rem;
      line-height: 1;
      padding: 0.65rem 0.25rem 0.45rem;
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      text-shadow: 0 0 10px var(--glow-dim);
      transition: background 0.08s, border-color 0.08s, box-shadow 0.08s;
      user-select: none;
      -webkit-user-select: none;
    }

    .key:hover {
      background: #0e2030;
      border-color: var(--glow-mid);
      box-shadow: 0 0 14px var(--glow-dim);
    }

    .key:active {
      background: #122838;
      box-shadow: 0 0 24px var(--glow-mid);
    }

    .key-digit {
      font-size: 0.48rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    /* ── Controls ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45rem;
    }

    .btn {
      background: #0c1520;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #4a7080;
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      padding: 0.6rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.08s;
      user-select: none;
    }

    .btn:hover {
      background: #0e2030;
      color: #8ab8c8;
      border-color: #253a4a;
    }

    .btn:active {
      background: #122838;
    }

    /* ── Legend ── */
    .legend {
      margin-top: 1.6rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem 1.2rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .legend-sym {
      font-size: 1rem;
      color: var(--glow);
      text-shadow: 0 0 6px var(--glow-dim);
    }

    /* Keyboard hint */
    .keyboard-hint {
      margin-top: 0.9rem;
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: #1e3040;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <h1>Xenolingual Numeral Decoder</h1>
    <p class="subtitle">Base VI → Base X · Read left to right</p>
  </header>

  <div class="panel">
    <div class="display">
      <div class="display-label">Alien Input</div>
      <div class="alien-number" id="alienDisplay"></div>
      <div class="display-divider"></div>
      <div class="result-row">
        <span class="result-label">Decimal&nbsp;=</span>
        <span class="result-value empty" id="resultDisplay">—</span>
      </div>
    </div>

    <div class="key-section-label">Numeral Pad</div>
    <div class="key-grid" id="keyGrid"></div>

    <div class="controls">
      <button class="btn" id="btnBack">← Backspace</button>
      <button class="btn" id="btnClear">Clear</button>
    </div>
  </div>

  <div class="legend" id="legend"></div>
  <p class="keyboard-hint">Keyboard: 0–5 · Backspace · Esc to clear</p>

  <script>
    // Symbol definitions — digit 5 uses CSS .vs class for the stroked-V
    const SYMBOLS = [
      { digit: 0, html: 'ℓ'                        },
      { digit: 1, html: 'I'                         },
      { digit: 2, html: 'V'                         },
      { digit: 3, html: 'λ'                         },
      { digit: 4, html: '+'                         },
      { digit: 5, html: '<span class="vs">V</span>' },
    ];

    let digits = [];

    // ── Conversion ──────────────────────────────────────────────────────────
    function toDecimal(digits) {
      return digits.reduce((acc, d) => acc * 6 + d, 0);
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const display = document.getElementById('alienDisplay');
      const result  = document.getElementById('resultDisplay');

      if (digits.length === 0) {
        display.innerHTML = '<span class="cursor"></span>';
        result.textContent = '—';
        result.className = 'result-value empty';
      } else {
        display.innerHTML =
          digits.map(d => SYMBOLS[d].html).join('') +
          '<span class="cursor"></span>';

        const dec = toDecimal(digits);
        result.textContent = dec.toLocaleString('en-GB');
        result.className = 'result-value';
      }
    }

    // ── Actions ──────────────────────────────────────────────────────────────
    function input(digit) {
      digits.push(digit);
      render();
    }

    function backspace() {
      if (digits.length) { digits.pop(); render(); }
    }

    function clear() {
      digits = [];
      render();
    }

    // ── Build key grid ───────────────────────────────────────────────────────
    const grid = document.getElementById('keyGrid');
    SYMBOLS.forEach(sym => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.innerHTML =
        sym.html +
        `<span class="key-digit">${sym.digit}</span>`;
      btn.addEventListener('click', () => input(sym.digit));
      grid.appendChild(btn);
    });

    // ── Build legend ─────────────────────────────────────────────────────────
    const legendEl = document.getElementById('legend');
    SYMBOLS.forEach(sym => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML =
        `<span class="legend-sym">${sym.html}</span>` +
        `<span>= ${sym.digit}</span>`;
      legendEl.appendChild(item);
    });

    // ── Controls ─────────────────────────────────────────────────────────────
    document.getElementById('btnBack').addEventListener('click', backspace);
    document.getElementById('btnClear').addEventListener('click', clear);

    // ── Keyboard support ─────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      const n = parseInt(e.key, 10);
      if (n >= 0 && n <= 5)         { input(n);    return; }
      if (e.key === 'Backspace')     { backspace(); return; }
      if (e.key === 'Escape' || e.key === 'Delete') { clear(); }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    render();
  </script>

</body>
</html>
